<div id="auth-container" class="container">
    <h2>چوونەژوورەوە</h2>
    <input type="email" id="email" placeholder="ئیمێڵ">
    <input type="password" id="password" placeholder="پاسوۆرد">
    <div class="auth-buttons">
        <button onclick="login()" class="main-btn">چوونەژوورەوە</button>
        <button onclick="register()" class="secondary-btn">دروستکردنی ئەکاونت</button>
    </div>
</div>

<div id="app-container" class="container" style="display: none;">
    <div class="header">
        <button id="logout-btn" class="logout-btn">چوونە دەرەوە</button>
        <button id="theme-toggle" class="theme-btn">🌙</button>
    </div>
    </div>
